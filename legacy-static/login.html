<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Agury Auto</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--gold"></div>
  <div class="page-wrap">
    <nav class="navbar scrolled">
      <div class="container nav-inner">
        <a href="index.html" class="logo"><span class="logo-icon">A</span> Agury Auto</a>
        <div class="nav-actions">
          <a href="index.html" class="btn btn-ghost btn-sm">← Voltar</a>
        </div>
      </div>
    </nav>

    <main class="auth-page">
      <div class="auth-card">
        <div id="alert-box"></div>
        <h1>Entrar</h1>
        <p class="subtitle">Acesse sua conta de cliente ou oficina</p>

        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-type="customer">Cliente</button>
          <button type="button" class="auth-tab" data-type="store">Oficina</button>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
        </form>

        <div class="auth-divider">ou crie uma conta</div>

        <div style="display:grid;gap:0.75rem;">
          <a href="cadastro/cliente.html" class="btn btn-secondary btn-block">Cadastro Cliente</a>
          <a href="cadastro/loja.html" class="btn btn-secondary btn-block">Cadastro Oficina</a>
        </div>

        <div class="auth-links" style="margin-top:1.5rem;font-size:0.8rem;color:var(--text-muted);">
          Demo oficina: contato@aguryauto.com.br / demo123
        </div>
      </div>
    </main>
  </div>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let loginType = 'customer';
      const tabs = document.querySelectorAll('.auth-tab');
      const alertBox = document.getElementById('alert-box');

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          loginType = tab.dataset.type;
        });
      });

      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        let user = null;
        if (loginType === 'customer') {
          user = AguryDB.findCustomer(email, password);
        } else {
          user = AguryDB.findStore(email, password);
        }

        if (!user) {
          AguryUI.showAlert(alertBox, 'E-mail ou senha incorretos.', 'error');
          return;
        }

        AguryDB.setSession(user, loginType === 'customer' ? 'customer' : 'store');
        location.href = loginType === 'customer' ? 'dashboard/cliente.html' : 'dashboard/loja.html';
      });
    });
  </script>
</body>
</html>
