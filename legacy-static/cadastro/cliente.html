<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Cliente — Agury Auto</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--gold"></div>
  <div class="page-wrap">
    <nav class="navbar scrolled">
      <div class="container nav-inner">
        <a href="../index.html" class="logo"><span class="logo-icon">A</span> Agury Auto</a>
        <ul class="nav-links">
          <li><a href="../index.html">Início</a></li>
          <li><a href="../orcamento.html">Solicitar Orçamento</a></li>
        </ul>
        <div class="nav-actions">
          <a href="../login.html" class="btn btn-secondary btn-sm">Entrar</a>
        </div>
        <button class="menu-toggle" aria-label="Menu">☰</button>
      </div>
    </nav>

    <main class="auth-page">
      <div class="auth-card">
        <div id="alert-box"></div>
        <h1>Criar Conta Cliente</h1>
        <p class="subtitle">Acompanhe seus orçamentos e propostas das oficinas</p>

        <form id="register-form">
          <div class="form-group">
            <label>Nome completo <span class="required">*</span></label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label>E-mail <span class="required">*</span></label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label>Telefone / WhatsApp <span class="required">*</span></label>
            <input type="tel" id="phone" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Estado</label>
              <select id="state"></select>
            </div>
            <div class="form-group">
              <label>Cidade</label>
              <input type="text" id="city">
            </div>
          </div>
          <div class="form-group">
            <label>Senha <span class="required">*</span></label>
            <input type="password" id="password" minlength="6" required>
            <small>Mínimo 6 caracteres</small>
          </div>
          <div class="form-group">
            <label>Confirmar senha <span class="required">*</span></label>
            <input type="password" id="passwordConfirm" minlength="6" required>
          </div>
          <label class="form-check">
            <input type="checkbox" id="acceptTerms" required>
            <span>Aceito os <a href="../termos.html" target="_blank">Termos de Uso</a></span>
          </label>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Criar Conta</button>
        </form>

        <div class="auth-links">
          Já tem conta? <a href="../login.html">Entrar</a>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/db.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AguryUI.populateSelect(document.getElementById('state'), AguryUI.STATES, '-- Selecione --');
      const alertBox = document.getElementById('alert-box');
      const params = new URLSearchParams(location.search);

      if (params.get('from') === 'quote') {
        AguryUI.showAlert(alertBox, 'Crie sua conta para acompanhar os orçamentos que você solicitar.', 'info');
      }

      document.getElementById('register-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        if (password !== document.getElementById('passwordConfirm').value) {
          AguryUI.showAlert(alertBox, 'As senhas não coincidem.', 'error');
          return;
        }
        try {
          const customer = AguryDB.registerCustomer({
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim().toLowerCase(),
            phone: document.getElementById('phone').value.trim(),
            city: document.getElementById('city').value.trim(),
            state: document.getElementById('state').value,
            password,
          });
          AguryDB.setSession(customer, 'customer');
          AguryUI.showAlert(alertBox, 'Conta criada com sucesso! Redirecionando...', 'success');
          setTimeout(() => location.href = '../dashboard/cliente.html', 1500);
        } catch (err) {
          AguryUI.showAlert(alertBox, err.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
